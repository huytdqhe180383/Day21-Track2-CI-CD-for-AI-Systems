name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        # GCP:   echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
        #        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        # AWS:   echo "AWS_ACCESS_KEY_ID=..." >> $GITHUB_ENV  (lay tu secrets)
        #        echo "AWS_SECRET_ACCESS_KEY=..." >> $GITHUB_ENV
        # Azure: echo "AZURE_STORAGE_CONNECTION_STRING=..." >> $GITHUB_ENV
        run: |
          python - <<'PY'
          import json
          import os

          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])
          access_key = creds["aws_access_key_id"]
          secret_key = creds["aws_secret_access_key"]
          region = creds["spaces_region"]
          endpoint = creds.get("spaces_endpoint", f"https://{region}.digitaloceanspaces.com")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
            fh.write(f"AWS_ACCESS_KEY_ID={access_key}\n")
            fh.write(f"AWS_SECRET_ACCESS_KEY={secret_key}\n")
            fh.write(f"AWS_DEFAULT_REGION={region}\n")
            fh.write(f"SPACES_REGION={region}\n")
            fh.write(f"SPACES_ENDPOINT={endpoint}\n")
          PY
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: |
          if [ -f "data/train_phase1.csv.dvc" ] && [ -f "data/eval.csv.dvc" ]; then
            if [ ! -d ".dvc" ]; then
              dvc init --no-scm
            fi
            dvc remote add -d myremote "s3://${{ secrets.CLOUD_BUCKET }}/dvc" --force
            dvc remote modify myremote endpointurl "$SPACES_ENDPOINT"
            dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc
          else
            echo "DVC pointer files not found. Falling back to generated data."
            python generate_data.py
          fi

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        #
        # Goi y:
        #   ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
        #   echo "accuracy=$ACC" >> $GITHUB_OUTPUT
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json', encoding='utf-8')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len
        #         <bucket>/models/latest/model.pkl.
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          endpoint = os.environ["SPACES_ENDPOINT"]
          region = os.environ["SPACES_REGION"]

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              region_name=region,
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
          )
          key = "models/latest/model.pkl"
          s3.upload_file("models/model.pkl", bucket, key)
          print(f"Uploaded models/model.pkl -> s3://{bucket}/{key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        #
        # Goi y:
        #   acc = float("${{ needs.train.outputs.accuracy }}")
        #   if acc < 0.70:
        #       raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
        #   print("PASSED: dang trien khai model.")
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70

          if acc < threshold:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= {threshold:.2f}. Tiep tuc deploy.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            #         Neu health check that bai sau nhieu lan thu, thoat voi exit 1.
            #
            # Goi y:
            #   sudo systemctl restart mlops-serve
            #   sleep 5
            #   curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
            sudo systemctl restart mlops-serve

            for i in {1..10}; do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service... attempt $i/10"
              sleep 3
            done

            echo "Health check failed after 10 attempts."
            exit 1
