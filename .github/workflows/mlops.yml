name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configure MLflow tracking
        run: |
          if [ -n "${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI }}" ]; then
            echo "MLFLOW_TRACKING_URI=${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI }}" >> "$GITHUB_ENV"
            echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> "$GITHUB_ENV"
            echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> "$GITHUB_ENV"
            echo "Using DagsHub MLflow tracking."
          else
            echo "MLFLOW_TRACKING_URI=sqlite:///mlflow.db" >> "$GITHUB_ENV"
            echo "Using local MLflow tracking."
          fi
          echo "MLFLOW_ARTIFACT_ROOT=./mlartifacts" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          python - <<'PY'
          import json
          import os

          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])
          access_key = creds["aws_access_key_id"]
          secret_key = creds["aws_secret_access_key"]
          region = creds["spaces_region"]
          endpoint = creds.get("spaces_endpoint", f"https://{region}.digitaloceanspaces.com")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"AWS_ACCESS_KEY_ID={access_key}\n")
              fh.write(f"AWS_SECRET_ACCESS_KEY={secret_key}\n")
              fh.write(f"AWS_DEFAULT_REGION={region}\n")
              fh.write(f"SPACES_REGION={region}\n")
              fh.write(f"SPACES_ENDPOINT={endpoint}\n")
          PY
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        run: |
          if [ -f "data/train_phase1.csv.dvc" ] && [ -f "data/eval.csv.dvc" ]; then
            if [ ! -d ".dvc" ]; then
              dvc init --no-scm
            fi
            dvc remote add -d myremote "s3://${{ secrets.CLOUD_BUCKET }}/dvc" --force
            dvc remote modify myremote endpointurl "$SPACES_ENDPOINT"
            dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc
          else
            echo "DVC pointer files not found. Falling back to generated data."
            python generate_data.py
          fi

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json', encoding='utf-8')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          endpoint = os.environ["SPACES_ENDPOINT"]
          region = os.environ["SPACES_REGION"]

          s3 = boto3.client(
              "s3",
              endpoint_url=endpoint,
              region_name=region,
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
          )
          key = "models/latest/model.pkl"
          s3.upload_file("models/model.pkl", bucket, key)
          print(f"Uploaded models/model.pkl -> s3://{bucket}/{key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save train artifacts
        uses: actions/upload-artifact@v4
        with:
          name: train-artifacts
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Cloud Storage
        run: |
          python - <<'PY'
          import json
          import os

          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])
          access_key = creds["aws_access_key_id"]
          secret_key = creds["aws_secret_access_key"]
          region = creds["spaces_region"]
          endpoint = creds.get("spaces_endpoint", f"https://{region}.digitaloceanspaces.com")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"AWS_ACCESS_KEY_ID={access_key}\n")
              fh.write(f"AWS_SECRET_ACCESS_KEY={secret_key}\n")
              fh.write(f"AWS_DEFAULT_REGION={region}\n")
              fh.write(f"SPACES_REGION={region}\n")
              fh.write(f"SPACES_ENDPOINT={endpoint}\n")
          PY
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Compare with previous deployed model
        id: rollback_guard
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import json
          import os
          import boto3
          from botocore.exceptions import ClientError

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket = os.environ["CLOUD_BUCKET"]
          key = "metrics/latest/metrics.json"

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["SPACES_ENDPOINT"],
              region_name=os.environ["SPACES_REGION"],
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
          )

          should_deploy = True
          previous_acc = None
          note = "No previous deployed metrics found. Allow deploy."

          try:
              resp = s3.get_object(Bucket=bucket, Key=key)
              old = json.loads(resp["Body"].read().decode("utf-8"))
              previous_acc = float(old["accuracy"])
              should_deploy = new_acc >= previous_acc
              note = f"Compare accuracy: new={new_acc:.4f} vs old={previous_acc:.4f}"
          except ClientError as e:
              code = e.response.get("Error", {}).get("Code", "")
              if code not in {"NoSuchKey", "404"}:
                  raise

          print(note)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_deploy={'true' if should_deploy else 'false'}\n")
              fh.write(f"previous_accuracy={'' if previous_acc is None else previous_acc}\n")
          EOF

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          should_deploy = "${{ steps.rollback_guard.outputs.should_deploy }}".strip().lower() == "true"
          prev = "${{ steps.rollback_guard.outputs.previous_accuracy }}".strip()

          if acc < threshold:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy.")

          if not should_deploy:
              if prev:
                  raise SystemExit(f"FAILED: accuracy moi {acc:.4f} < accuracy dang chay {float(prev):.4f}. Huy deploy.")
              raise SystemExit("FAILED: rollback guard rejected deploy.")

          print(f"PASSED: accuracy {acc:.4f} >= {threshold:.2f} va vuot rollback guard.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Download train artifacts
        uses: actions/download-artifact@v4
        with:
          name: train-artifacts
          path: outputs

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in {1..10}; do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service... attempt $i/10"
              sleep 3
            done
            echo "Health check failed after 10 attempts."
            exit 1

      - name: Authenticate to Cloud Storage
        run: |
          python - <<'PY'
          import json
          import os

          creds = json.loads(os.environ["CLOUD_CREDENTIALS"])
          access_key = creds["aws_access_key_id"]
          secret_key = creds["aws_secret_access_key"]
          region = creds["spaces_region"]
          endpoint = creds.get("spaces_endpoint", f"https://{region}.digitaloceanspaces.com")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"AWS_ACCESS_KEY_ID={access_key}\n")
              fh.write(f"AWS_SECRET_ACCESS_KEY={secret_key}\n")
              fh.write(f"AWS_DEFAULT_REGION={region}\n")
              fh.write(f"SPACES_REGION={region}\n")
              fh.write(f"SPACES_ENDPOINT={endpoint}\n")
          PY
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Update deployed metrics
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["SPACES_ENDPOINT"],
              region_name=os.environ["SPACES_REGION"],
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
          )
          bucket = os.environ["CLOUD_BUCKET"]
          s3.upload_file("outputs/metrics.json", bucket, "metrics/latest/metrics.json")
          print("Updated deployed metrics at metrics/latest/metrics.json")
          EOF
